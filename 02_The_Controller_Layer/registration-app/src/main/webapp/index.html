<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | X-Workz Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --xworkz-navy: #0a192f;
            --slate-gray: #64748b;
            --border-light: #e2e8f0;
            --bg-page: #f8fafc;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .registration-card {
            max-width: 450px;
            width: 90%;
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            border-bottom: 6px solid var(--xworkz-navy);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .brand-header h3 {
            color: var(--xworkz-navy);
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .brand-header p {
            text-align: center;
            font-size: 0.9rem;
            color: var(--slate-gray);
            margin-bottom: 2rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--xworkz-navy);
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border: 1px solid var(--border-light);
            padding: 12px;
            border-radius: 8px;
            color: #1e293b;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--xworkz-navy);
            box-shadow: 0 0 0 3px rgba(10, 25, 47, 0.08);
            outline: none;
        }

        .btn-register {
            background-color: var(--xworkz-navy);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            border-radius: 8px;
            margin-top: 1rem;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn-register:hover {
            background-color: #112240;
            transform: translateY(-1px);
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="registration-card">
    <div class="brand-header">
        <h3>Join X-Workz Community</h3>
        <p>Accelerate your career in software development.</p>
    </div>

    <form action="submit-registration" method="POST">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Preferred Tech Stack</label>
            <select name="tech" class="form-select">
                <option value="java">Java Full Stack</option>
                <option value="python">Python Full Stack</option>
            </select>
        </div>

        <button type="submit" class="btn-register">
            Register Now
        </button>
    </form>

    <div class="footer-note">
        Building the next generation of engineers.
    </div>
</div>

</body>
</html>
